[platformio]
default_envs = default
build_cache_dir = .cache
extra_configs = platformio.local.ini

[crosspoint]
version = 1.3.0.25

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# German Liang hyphenation data costs about 200KB of flash. Leave it opt-in;
# German EPUBs still render and can break on explicit hyphens/fallback points.
  -DCPR_ENABLE_GERMAN_HYPHENATION=0
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort,--wrap=bootloader_common_check_efuse_blk_validity
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

; By default, exclude optional extra activities (e.g. Sokoban) from
; compilation entirely so CPR_ENABLE_EXTRA_ACTIVITIES=0 builds carry zero
; bytes for them, not just dead code behind an #if. The `extras` environment
; re-includes this folder (see [env:extras]).
build_src_filter =
  +<*>
  -<activities/extras/>

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py
  post:scripts/package_vcodex_bin.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ 1.1.6
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds
  -DCPR_ENABLE_EXTRA_ACTIVITIES=0


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py for release builds
  ; serial output is disabled in release builds to save flash and avoid log strings
  -UENABLE_SERIAL_LOG
  -DCPR_DISABLE_EVENT_LOGS=1
  -DLOG_LEVEL=-1
  -DCPR_ENABLE_EXTRA_ACTIVITIES=0

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds
  -DCPR_ENABLE_EXTRA_ACTIVITIES=0

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
  -DCPR_ENABLE_EXTRA_ACTIVITIES=0

[env:extras]
extends = base
; Re-include the extras/ activities directory that [base] excludes by
; default, so CPR_ENABLE_EXTRA_ACTIVITIES=0 builds carry zero bytes for it.
build_src_filter =
  +<*>
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (numbered when
  ; VCODEX_RELEASE_TAG matches "<base>.<release>-extras-cpr-vcodex")
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  ; Opt-in build that includes non-reading extras (e.g. Sokoban). Defined
  ; only here (never redefined from a [base] value) so the macro can't be
  ; shadowed by SCons' build_flags merging across `extends = base`.
  -DCPR_ENABLE_EXTRA_ACTIVITIES=1
